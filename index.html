<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Настройки для правильного отображения на смартфонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#333333">
    <title>Papers, Please - Day 1</title>
    
    <!-- Подключение манифеста для создания APK -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* Добавил запрет выделения текста, чтобы случайно не копировать буквы при нажатии кнопок */
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { background: #1a1a1a; color: #eee; font-family: 'Courier New', monospace; margin: 0; display: flex; justify-content: center; overflow: hidden; }
        #game-container { width: 100%; max-width: 600px; background: #333; border: 4px solid #555; padding: 15px; position: relative; height: 100vh; box-sizing: border-box; }
        .stats { display: flex; justify-content: space-between; border-bottom: 2px solid #555; padding-bottom: 10px; margin-bottom: 20px; font-weight: bold; }
        #passport { width: 90%; margin: 0 auto; background: #e0c9a6; color: #000; padding: 15px; border-radius: 5px; box-shadow: 5px 5px 0 #000; }
        #dialogue-box { height: 80px; background: #000; padding: 10px; margin: 20px 0; border: 2px solid #777; overflow-y: auto; font-size: 14px; }
        .controls { display: flex; gap: 10px; justify-content: center; position: absolute; bottom: 20px; left: 15px; right: 15px; }
        button { padding: 15px; cursor: pointer; border: none; font-weight: bold; flex: 1; font-size: 16px; border-radius: 4px; }
        .approve { background: #4caf50; color: white; }
        .deny { background: #f44336; color: white; }
        
        #report-screen, #arrest-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; text-align: center; padding-top: 50px; }
        .report-paper { background: #fff; color: #000; width: 80%; margin: 0 auto; padding: 20px; text-align: left; box-shadow: 10px 10px 0 #444; }
        .red-text { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Экран ареста -->
    <div id="arrest-screen">
        <h1 style="color: #ff0000;">ВЫ АРЕСТОВАНЫ</h1>
        <div style="font-size: 50px; margin: 20px;">👮‍♂️</div>
        <p id="final-money" style="font-size: 18px; margin: 15px; padding: 0 10px;"></p>
        <button onclick="location.reload()" style="background: red; color: white; max-width: 200px;">ПЕРЕИГРАТЬ</button>
    </div>

    <!-- Экран отчета -->
    <div id="report-screen">
        <div class="report-paper">
            <h2 style="text-align: center; border-bottom: 2px solid #000;">ОТЧЕТ ЗА ДЕНЬ</h2>
            <p>Заработано: <span id="earned-val">0</span>$</p>
            <p>Отопление: <span class="red-text">-5$</span></p>
            <p>Еда: <span class="red-text">-10$</span></p>
            <hr>
            <p style="font-size: 1.2em;">ИТОГО: <b id="total-val">0</b>$</p>
            <p id="family-status" style="font-weight: bold;"></p>
            <button onclick="location.reload()" style="background: #333; color: white; width: 100%; margin-top: 10px;">СЛЕДУЮЩИЙ ДЕНЬ</button>
        </div>
    </div>

    <div class="stats">
        <div>ДЕНЬ 1</div>
        <div>СЧЕТ: <span id="money-display">20</span>$</div>
    </div>

    <div id="passport">
        <h3 style="text-align:center; margin: 0 0 10px 0;">ARSTOTZKA PASSPORT</h3>
        <p>Имя: <b id="p-name">---</b></p>
        <p>Город: <b id="p-city">---</b></p>
    </div>

    <div id="dialogue-box">Ожидание...</div>

    <div class="controls">
        <button class="approve" onclick="check(true)">ОДОБРИТЬ</button>
        <button class="deny" onclick="check(false)">ОТКАЗАТЬ</button>
    </div>
</div>

<script>
    let money = 20;
    let personIndex = 0;

    const people = [
        { name: "Иван Петров", city: "Грестин", valid: true, msg: "Добрый день. Мои документы." },
        { name: "Серпу Бенедиктов", city: "???", valid: false, msg: "О, привет! Это я, Серпу! Пустишь старика без бумажек?" },
        { name: "Шишкин К.", city: "Орбит", valid: false, msg: "Просто штампуй, не задавай вопросов." }
    ];

    function updatePerson() {
        if (personIndex >= people.length) {
            showFinalReport();
            return;
        }
        const p = people[personIndex];
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-city').innerText = p.city;
        document.getElementById('dialogue-box').innerText = p.msg;
    }

    function check(isApprove) {
        const p = people[personIndex];
        if (!p) return;

        if (isApprove === p.valid) {
            money += 5;
            document.getElementById('dialogue-box').innerText = "ПРАВИЛЬНО. +5$";
        } else {
            money -= 5;
            document.getElementById('dialogue-box').innerText = "ОШИБКА! Штраф -5$";
            if (money < 0) {
                showArrest("Вы обанкротились из-за штрафов.");
                return;
            }
        }

        document.getElementById('money-display').innerText = money;
        personIndex++;
        setTimeout(updatePerson, 1000);
    }

    function showFinalReport() {
        const earned = money;
        const total = earned - 15;
        document.getElementById('report-screen').style.display = 'block';
        document.getElementById('earned-val').innerText = earned;
        document.getElementById('total-val').innerText = total;

        if (total < 0) {
            document.getElementById('family-status').innerText = "СЕМЬЯ ГОЛОДАЕТ!";
            document.getElementById('family-status').style.color = "red";
            setTimeout(() => showArrest("У вас не осталось денег на жизнь."), 2500);
        } else {
            document.getElementById('family-status').innerText = "СЕМЬЯ В ПОРЯДКЕ";
            document.getElementById('family-status').style.color = "green";
        }
    }

    function showArrest(reason) {
        document.getElementById('report-screen').style.display = 'none';
        document.getElementById('arrest-screen').style.display = 'block';
        document.getElementById('final-money').innerText = reason + " Итог: " + money + "$";
    }

    updatePerson();
</script>

</body>
</html>
